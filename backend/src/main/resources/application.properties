spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
server.servlet.context-path=/enhancesql

# ──────────────────────────────────────────────────
# Oracle Query Hint（留空 = 不加 hint，讓 CBO 自行決定）
# 使用前請先用 DBMS_XPLAN 確認執行計畫，找到 CBO 誤判的地方再填入。
#
# 常用組合範例：
#   JOIN 順序 + NL：  LEADING(S L Y) USE_NL(L) USE_NL(Y) INDEX(S) INDEX(Y)
#   大表 Hash Join：  LEADING(S L Y) USE_HASH(Y) INDEX(S)
#   只強制 index：    INDEX(S) INDEX(Y)
# ──────────────────────────────────────────────────
query.hint=
